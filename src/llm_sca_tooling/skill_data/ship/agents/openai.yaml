interface:
  display_name: "Ship"
  short_description: >
    Update dependencies, run evaluations, or cut a versioned release.
    Invokes the llm-sca-tooling MCP server.

policy:
  allow_implicit_invocation: true

dependencies:
  tools:
    - type: "mcp"
      value: "llm-sca-tooling"
      description: "LLM SCA Tooling MCP server for release gating and evaluation"
      transport: "stdio"
