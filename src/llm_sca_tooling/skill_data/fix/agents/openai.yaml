interface:
  display_name: "Fix"
  short_description: >
    Fix bugs, SAST findings, or refactor code safely.
    Invokes the llm-sca-tooling MCP server.

policy:
  allow_implicit_invocation: true

dependencies:
  tools:
    - type: "mcp"
      value: "llm-sca-tooling"
      description: "LLM SCA Tooling MCP server for code analysis and repair"
      transport: "stdio"
