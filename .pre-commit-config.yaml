# .pre-commit-config.yaml — generated by local-agent-harness, extended for Phase H0
# Run: pre-commit install  (first time, or after cloning)
# Run: pre-commit run --all-files  (manually)
#
# .gitignore is excluded from formatting hooks because it has machine-managed sections.

exclude: '(\.gitignore$)'

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
        exclude: '(\.gitignore$)'
      - id: trailing-whitespace
        exclude: '(\.gitignore$)'
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-json
      - id: check-toml

  # Secrets detection — HC1 enforcement
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]
        exclude: '(uv\.lock$|\.secrets\.baseline$|^\.agent/)'

  # Secrets scan (belt-and-suspenders, pattern-based)
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.23.3
    hooks:
      - id: gitleaks

  # Import sorting
  - repo: https://github.com/PyCQA/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: ["--profile", "black"]

  # Code formatting
  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
        language_version: python3.12

  # Linting
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.10
    hooks:
      - id: ruff
        args: ["--fix"]

  # Markdown linting
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.44.0
    hooks:
      - id: markdownlint
        args: ["--disable", "MD013", "MD033"]
        exclude: '(\.gitignore$)'
